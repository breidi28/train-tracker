services:
  - type: web
    name: train-tracker-api
    runtime: python
    rootDir: backend/cfr-iris-scraper
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
